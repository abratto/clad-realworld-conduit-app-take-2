# CLAD project-wide settings
#
# Edit this file to configure your project. It works with any agent
# framework (Cline, Copilot, Cursor, Roo, Codex, …).

# --- Canonical test command ---
# The single shell command that runs all tests for this profile.
# Used by the quality gate and by CLAD green-work agents after each edit.
# Examples:
#   mvn test
#   ./gradlew test
#   npm test
test.command=mvn test -f app/backend/pom.xml

# --- Use case stage configuration ---
# Whether to require Mermaid sequence diagrams in Stage 01 use cases.
# Set to false if your LLM struggles with diagram generation.
# When true, every Fully Dressed scenario must include a sequenceDiagram.
# When false, diagrams are optional.
stages.usecase.require-sequence-diagram=true

# --- Workflow autonomy (how much the agent stops for the human) ---
# Controls the behaviour of quality-gate/advance.py between stages.
# This is a deliberate human choice; the agent must NEVER change it on
# its own initiative (see AGENTS.md §2 principle 13).
#
#   gated  — (default, safest) Stop and wait for the human at all three
#            human gates (Requirements, Architecture, Executable spec).
#            Run every deterministic check; block on any failure.
#
#   auto   — Do NOT wait at human gates: advance.py records each gate as
#            `auto-approved` and moves on. Deterministic checks STILL run
#            and STILL block on failure. Use when you trust the agent's
#            design judgement but want the mechanical guards kept.
#
#   yolo   — "Rip through." Auto-approve human gates AND downgrade check
#            failures to warnings so they do not block. Structural
#            integrity is still enforced: a fully skipped stage (a gap in
#            the artefact chain) remains a hard stop even here.
#
# Auto-approved gates are recorded as `auto-approved` (not `approved`) so
# a reviewer can always see which gates a human never inspected.
workflow.autonomy=gated

# --- Storage layer ---
# A human-readable description of your persistence technology.
# Used by the Stage 04a storage-mapping context to tell the agent what
# storage primitives it should model.
# Examples:
#   Jena TDB2 named graph (Java/Micronaut profile)
#   PostgreSQL schema per concept (Spring Boot profile)
#   MongoDB collection per concept (Node.js profile)
storage.layer=Jena TDB2 named graph (Java/Micronaut profile)

# --- JSON serialization ---
# CLAD syncs author field-value maps where missing fields imply null.
# Set your framework's JSON serializer to always include null values
# rather than omitting them. The Conduit spec asserts e.g.
#   jsonpath "$.user.bio" == null
# which fails with 'none' when nulls are omitted.
jackson.serialization-inclusion=always

# --- Implementation paths (for profile-specific quality checks) ---
# Paths relative to the repo root. Used by quality-gate scripts that scan
# implementation files (Java, Kotlin, etc.). If a path is unset or does not
# exist at check time, the check skips automatically.
# Examples:
#   sync.impl.dir=reference-impl/java-micronaut-jena/src/main/java/com/example/app/syncs
#   concept.impl.dir=reference-impl/java-micronaut-jena/src/main/java/com/example/app/concepts
#   test.source.root=reference-impl/java-micronaut-jena/src/test/java/com/example/app
sync.impl.dir=app/backend/src/main/java/com/example/app/syncs
concept.impl.dir=app/backend/src/main/java/com/example/app/concepts
test.source.root=app/backend/src/test/java/com/example/app

# --- Engine settings ---
# Dataset backend for the action log and concept state.
#   tmemory — in-memory transactional Dataset (TxnMem). Zero-setup,
#             best for development and testing. Not safe for concurrent
#             read/write under load; uses MRSW locking.
#   tdb2    — persistent MVCC Dataset backed by B+ trees on disk.
#             Concurrent reads and writes without blocking. Production
#             deployments should use this with engine.dataset.tdb2.dir
#             pointing to a persistent volume.
engine.dataset.type=tmemory
engine.dataset.tdb2.dir=./clad-tdb2-store
# Maximum wall-clock seconds the dispatch loop waits for a Web/respond
# before returning 500 Request timed out. Tune lower (1-3) for
# high-concurrency TDB2 deployments where lock contention can cause
# tail-latency stalls.
engine.dispatch.timeout.seconds=5

# Whether to archive completed flow triples into an in-memory archive graph
# for Stage 05 verification and runtime debugging. Set to true during
# development; set to false in production to prevent unbounded heap growth.
# When false, completed flow triples are deleted (vacuumed) after the
# response is returned, freeing memory immediately.
engine.archive.flows=true
